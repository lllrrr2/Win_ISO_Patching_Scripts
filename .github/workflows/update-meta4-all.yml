name: Update meta4 files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  update-meta4:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update meta4 files
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE

          $meta4Files = Get-ChildItem -Path "Scripts" -Recurse -Filter "*.meta4"
          if (-not $meta4Files) {
            Write-Host "No meta4 files found"
            exit 0
          }

          $changed = $false

          foreach ($meta4 in $meta4Files) {

            # -------- 架构从 meta4 文件名识别 --------
            $meta4Name = $meta4.Name.ToLower()
            if ($meta4Name -match "_x64\.meta4$") {
              $arch = "x64"
            } elseif ($meta4Name -match "_x86\.meta4$") {
              $arch = "x86"
            } elseif ($meta4Name -match "_arm64\.meta4$") {
              $arch = "arm64"
            } else {
              continue
            }

            $lines = Get-Content $meta4.FullName -Raw -Encoding UTF8
            $original = $lines

            # -------- 匹配 <file> 块（不破坏格式）--------
            $pattern = '(?s)<file name="([^"]+)">.*?<hash type="sha-1">([^<]+)</hash>.*?<url>([^<]+)</url>.*?</file>'

            $lines = [regex]::Replace($lines, $pattern, {
              param($m)

              $fileName = $m.Groups[1].Value
              $hash     = $m.Groups[2].Value
              $url      = $m.Groups[3].Value

              # 文件名中必须包含 kb + 架构
              if ($fileName -notmatch 'kb\d+' -or $fileName -notmatch "-$arch") {
                return $m.Value
              }

              if ($url -notmatch 'windowsupdate\.com|delivery\.mp\.microsoft\.com') {
                return $m.Value
              }

              # -------- 重新从 URL 提取最新文件名 / hash --------
              $newFile = [System.IO.Path]::GetFileName($url)

              if ($newFile -ne $fileName) {
                $changed = $true
                return $m.Value -replace [regex]::Escape($fileName), $newFile
              }

              return $m.Value
            })

            if ($lines -ne $original) {
              Set-Content -Path $meta4.FullName -Value $lines -Encoding UTF8 -NoNewline
            }
          }

          if (-not $changed) {
            Write-Host "No meta4 content changed"
            exit 0
          }

      - name: Commit and push
        if: success()
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git status
          git diff --quiet && exit 0

          git add Scripts
          git commit -m "auto: update meta4 for latest Windows and .NET patches"
          git push origin master
