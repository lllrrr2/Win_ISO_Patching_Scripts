name: Update meta4 from existing KB entries

on:
  workflow_dispatch:

jobs:
  update-meta4:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Update meta4 files
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE

          $meta4Files = Get-ChildItem Scripts -Recurse -Filter "*.meta4"

          foreach ($meta4 in $meta4Files) {
              Write-Host "Processing $($meta4.FullName)"

              $raw = Get-Content $meta4.FullName -Raw
              $xml = [xml]$raw

              $changed = $false

              foreach ($node in $xml.metalink.file) {
                  $name = $node.name

                  # 从文件名解析 KB（Windows / .NET 通用）
                  if ($name -match '(kb\d{6,8})') {
                      $kbId = $Matches[1]

                      # ==================================================
                      # TODO: 这里接你“真实”的解析结果
                      # 你已经有的数据来源之一：
                      # - patch_list.json
                      # - 你已有的 catalog 抓取逻辑
                      #
                      # 最终必须给出：
                      #   $newName
                      #   $newHash
                      #   $newUrl
                      # ==================================================

                      if (-not $newName -or -not $newHash -or -not $newUrl) {
                          continue
                      }

                      if (
                          $node.name -ne $newName -or
                          $node.hash.'#text' -ne $newHash -or
                          $node.url -ne $newUrl
                      ) {
                          $node.name = $newName
                          $node.hash.'#text' = $newHash
                          $node.url = $newUrl
                          $changed = $true
                          Write-Host "Updated ${kbId}"
                      }
                  }
              }

              if ($changed) {
                  $xml.Save($meta4.FullName)
              }
          }

      - name: Commit changes
        run: |
          git add Scripts
          git commit -m "auto: update meta4 from existing KB entries" || echo "No changes"

      - name: Push to master
        run: |
          git push origin master
