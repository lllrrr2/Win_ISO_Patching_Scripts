name: Update Meta4 KB

on:
  workflow_dispatch:

jobs:
  update-meta4:
    runs-on: windows-latest

    steps:
      - name: Checkout 2025.11d branch
        uses: actions/checkout@v4
        with:
          ref: 2025.11d

      - name: Setup PowerShell
        shell: pwsh

      - name: Update meta4 files
        shell: pwsh
        run: |
          # 遍历 Scripts 文件夹下的所有 meta4 文件
          $meta4Files = Get-ChildItem -Path Scripts -Filter '*.meta4' -Recurse

          function Get-LatestKB {
              param(
                  [string]$KbId,
                  [string]$Arch
              )

              # 示例：抓 Microsoft Catalog JSON 页面 (需要改成真实 API 或 HTML 解析)
              $catalogUrl = "https://www.catalog.update.microsoft.com/Search.aspx?q=$KbId"
              # 这里可以用 Invoke-WebRequest / Invoke-RestMethod 解析 JSON 或 HTML，返回最新 msu/cab
              # 为示例返回原值
              return @{
                  Url  = "https://catalog.sf.dl.delivery.mp.microsoft.com/fake/$KbId-$Arch.msu"
                  Hash = "FAKEHASH1234567890"
              }
          }

          foreach ($meta4 in $meta4Files) {
              $meta4Name = $meta4.Name.ToLower()
              if ($meta4Name -match "_x64\.meta4$") { $arch = "x64" }
              elseif ($meta4Name -match "_x86\.meta4$") { $arch = "x86" }
              elseif ($meta4Name -match "_arm64\.meta4$") { $arch = "arm64" }
              else { continue }

              Write-Host "Processing $($meta4.Name) for $arch"

              # 读取 meta4
              [xml]$xml = Get-Content $meta4.FullName

              $updatedXml = @()
              $updatedXml += '<metalink xmlns="urn:ietf:params:xml:ns:metalink">'
              $updatedXml += "  <generator>Updated by GitHub Actions</generator>"

              foreach ($file in $xml.metalink.file) {
                  $fileName = $file.name
                  if ($fileName -match "kb\d+") {
                      $kbId = $Matches[0].ToUpper()
                      Write-Host "Found KB: $kbId"

                      $latest = Get-LatestKB -KbId $kbId -Arch $arch

                      $hashType = "sha-1"
                      $hash     = $latest.Hash
                      $url      = $latest.Url

                      Write-Host "Updating KB $kbId -> URL: $url, SHA1: $hash"

                      $updatedXml += "  <file name=`"$fileName`">"
                      $updatedXml += "    <hash type=`"$hashType`">$hash</hash>"
                      $updatedXml += "    <url>$url</url>"
                      $updatedXml += "  </file>"
                  }
              }

              $updatedXml += '</metalink>'
              $updatedXml -join "`n" | Set-Content $meta4.FullName -Encoding UTF8
          }

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add Scripts
          $status = git status --porcelain
          if ($status) {
              git commit -m "Update meta4 KB to latest (2025.12b-test)"
              git push origin HEAD:2025.12b-test
          } else {
              Write-Host "No changes to commit."
          }
