name: Generate Windows Meta4 Updates

on:
  workflow_dispatch:

jobs:
  generate-meta4:
    runs-on: windows-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v3
      with:
        ref: 2025.11d  # 指定旧分支作为基准

    - name: Setup PowerShell
      shell: pwsh
      run: |
        Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"

    - name: Generate meta4 files
      shell: pwsh
      run: |
        # 进入工作目录
        Set-Location $env:GITHUB_WORKSPACE

        # 输出日志
        Write-Host "Generating meta4 files..."

        # 遍历 Scripts 目录下所有 meta4 文件
        $meta4Files = Get-ChildItem Scripts/*.meta4
        foreach ($meta4 in $meta4Files) {
            $meta4Name = $meta4.Name.ToLower()
            if ($meta4Name -match "_x64\.meta4$") {
                $arch = "x64"
            } elseif ($meta4Name -match "_x86\.meta4$") {
                $arch = "x86"
            } elseif ($meta4Name -match "_arm64\.meta4$") {
                $arch = "arm64"
            } else {
                Write-Host "Skipping unknown architecture: $($meta4.Name)"
                continue
            }

            # 读取 XML
            [xml]$xmlContent = Get-Content $meta4.FullName

            # 新 XML 集合
            $updatedXml = @()
            $updatedXml += '<metalink xmlns="urn:ietf:params:xml:ns:metalink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:noNamespaceSchemaLocation="metalink4.xsd">'

            foreach ($file in $xmlContent.metalink.file) {
                $fileName = $file.name
                $hashType = $file.hash.type
                $hash = $file.hash.InnerText
                $url = $file.url.InnerText

                Write-Host "[$arch] KB: $fileName | Hash: $hash | URL: $url"

                $updatedXml += "  <file name=`"$fileName`">"
                $updatedXml += "    <hash type=`"$hashType`">$hash</hash>"
                $updatedXml += "    <url>$url</url>"
                $updatedXml += "  </file>"
            }

            $updatedXml += '</metalink>'

            # 写入文件
            $updatedXml | Out-File -Encoding UTF8 $meta4.FullName

            Write-Host "Updated meta4 file: $($meta4.Name)"
        }

    - name: Generate Release Notes
      shell: pwsh
      run: |
        $releaseNotes = @()
        $meta4Files = Get-ChildItem Scripts/*.meta4
        foreach ($meta4 in $meta4Files) {
            [xml]$xmlContent = Get-Content $meta4.FullName
            foreach ($file in $xmlContent.metalink.file) {
                $kb = ($file.name -split "_")[1]
                $releaseNotes += "$($meta4.BaseName): $kb"
            }
        }
        $releaseNotes | Out-File -Encoding UTF8 ReleaseNotes.txt
        Write-Host "Release notes generated:"
        Get-Content ReleaseNotes.txt | ForEach-Object { Write-Host $_ }

    - name: Commit and Push
      shell: pwsh
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git checkout -b 2025.12b-test
        git add Scripts/*.meta4 ReleaseNotes.txt

        git diff --quiet || git commit -m "Update meta4 files and release notes for 2025.12b-test"
        git push origin 2025.12b-test --force
