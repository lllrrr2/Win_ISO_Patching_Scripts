name: Generate Meta4 & Release Note

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Source branch to generate meta4'
        default: '2025.11d'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set PowerShell Execution Policy
        run: Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass

      - name: Parse Meta4 and Generate Release Note
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          
          $outputDir = "$env:GITHUB_WORKSPACE/Scripts"
          $releaseNote = "$env:GITHUB_WORKSPACE/RELEASE_NOTE.txt"
          $branchTarget = "2025.12b-test"

          git fetch origin $branchTarget || git checkout -b $branchTarget

          $releaseText = ""

          Get-ChildItem "$outputDir" -Filter "*.meta4" | ForEach-Object {
              $meta4File = $_
              [xml]$meta4 = Get-Content -Path $meta4File.FullName

              # 架构识别
              $meta4Name = $meta4File.Name.ToLower()
              if ($meta4Name -match "_x64\.meta4$") { $arch = "x64" }
              elseif ($meta4Name -match "_x86\.meta4$") { $arch = "x86" }
              elseif ($meta4Name -match "_arm64\.meta4$") { $arch = "arm64" }
              else { $arch = "Unknown" }

              $updatedXml = @()
              $updatedXml += '<metalink xmlns="urn:ietf:params:xml:ns:metalink">'
              $updatedXml += '  <file name="dummy">DUMMY</file>' # placeholder

              foreach ($file in $meta4.metalink.file) {
                  $fileName = $file.name
                  $hashType = $file.hash.type
                  $hash     = $file.hash.'#text'
                  $url      = $file.url.'#text'

                  if ($fileName -match "kb(\d+)") { $kbId = $matches[1] } else { $kbId = "Unknown" }

                  Write-Host "Found KB: $kbId [$arch]"
                  Write-Host "  Hash : $hash ($hashType)"
                  Write-Host "  URL  : $url"

                  # 追加到更新 XML
                  $updatedXml += "  <file name=`"$fileName`">"
                  $updatedXml += "    <hash type=`"$hashType`">$hash</hash>"
                  $updatedXml += "    <url>$url</url>"
                  $updatedXml += "  </file>"

                  # 写 Release Note
                  $releaseText += "$($meta4File.BaseName) [$arch]: KB$kbId -> $fileName`n"
              }

              $updatedXml += '</metalink>'

              # 保存更新后的 meta4 文件
              $updatedXml | Out-File -FilePath $meta4File.FullName -Encoding utf8
          }

          # 保存 Release Note
          $releaseText | Out-File -FilePath $releaseNote -Encoding utf8

      - name: Commit & Push Changes
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Scripts
          git add RELEASE_NOTE.txt
          git commit -m "Auto update meta4 and release note"
          git push origin HEAD:2025.12b-test
