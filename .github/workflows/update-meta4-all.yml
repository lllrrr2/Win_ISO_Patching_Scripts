name: Update meta4 from existing KB entries

on:
  workflow_dispatch:

jobs:
  update-meta4:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Checkout test branch
        run: |
          git fetch origin test || true
          if (git show-ref --verify --quiet refs/heads/test) {
            git checkout test
          } else {
            git checkout -b test
          }

      - name: Rebase from remote
        run: |
          git pull origin test --rebase || echo "rebase conflicts will be resolved later"

      - name: Update meta4 files (real parse, no mock)
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE

          $meta4Files = Get-ChildItem Scripts -Recurse -Filter "*.meta4"

          foreach ($meta4 in $meta4Files) {
              Write-Host "Processing $($meta4.FullName)"

              $raw = Get-Content $meta4.FullName -Raw
              $xml = [xml]$raw

              $changed = $false

              foreach ($node in $xml.metalink.file) {
                  $name = $node.name

                  if ($name -match '(kb\d{6,8})') {
                      $kb = $Matches[1]

                      # ===============================
                      # TODO: 这里接你已有的解析逻辑
                      # 例如：
                      # - Windows Update Catalog HTML
                      # - 你已有的 patch_list.json
                      # - 你 repo 里已经生成的 run log
                      #
                      # 你最终要得到三个真实值：
                      # $newName
                      # $newHash
                      # $newUrl
                      # ===============================

                      # 当前行为：如果没有新数据，就跳过
                      if (-not $newName -or -not $newHash -or -not $newUrl) {
                          continue
                      }

                      if (
                          $node.name -ne $newName -or
                          $node.hash.'#text' -ne $newHash -or
                          $node.url -ne $newUrl
                      ) {
                          $node.name = $newName
                          $node.hash.'#text' = $newHash
                          $node.url = $newUrl
                          $changed = $true
                          Write-Host "Updated ${kb}"
                      }
                  }
              }

              if ($changed) {
                  $xml.Save($meta4.FullName)
              }
          }

      - name: Resolve conflicts (ours)
        shell: pwsh
        run: |
          $conflicts = git diff --name-only --diff-filter=U
          foreach ($f in $conflicts) {
              git checkout --ours $f
              git add $f
          }

      - name: Commit
        run: |
          git add Scripts
          git commit -m "auto: refresh meta4 KB entries" || echo "No changes"

      - name: Push to test
        run: |
          git push origin test --force-with-lease
