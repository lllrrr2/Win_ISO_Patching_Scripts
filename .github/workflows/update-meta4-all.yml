name: Update Meta4 KBs

on:
  workflow_dispatch:

jobs:
  update-kbs:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: 2025.11d   # 使用 2025.11d 分支作为基准

      - name: Install MSCatalogLTS
        shell: pwsh
        run: |
          Install-Module MSCatalogLTS -Force -Scope CurrentUser

      - name: Update Meta4 Files
        shell: pwsh
        run: |
          $metaDir = "$env:GITHUB_WORKSPACE/Scripts"
          $metaFiles = Get-ChildItem $metaDir -Filter "script_*.meta4"

          $releaseNote = ""

          foreach ($meta4 in $metaFiles) {
              # -------- 架构从 meta4 文件名识别 --------
              $meta4Name = $meta4.Name.ToLower()
              if ($meta4Name -match "_x64\.meta4$") {
                  $arch = "x64"
              } elseif ($meta4Name -match "_x86\.meta4$") {
                  $arch = "x86"
              } elseif ($meta4Name -match "_arm64\.meta4$") {
                  $arch = "arm64"
              } else {
                  Write-Host "Skip unknown architecture: $($meta4.Name)"
                  continue
              }

              Write-Host "`nProcessing $($meta4.Name) [$arch]"

              [xml]$xmlDoc = Get-Content $meta4.FullName

              $updated = $false

              foreach ($fileNode in $xmlDoc.metalink.file) {
                  if ($fileNode.name -match "KB(\d+)") {
                      $kbId = $Matches[1]
                      Write-Host "Found KB$kbId"

                      # 查询 Microsoft Update Catalog 最新文件
                      $results = Get-MSCatalogUpdate -Search "KB$kbId" -Architecture $arch
                      if ($results.Count -eq 0) {
                          Write-Host "No catalog result for KB$kbId [$arch]"
                          continue
                      }

                      # 选最新更新
                      $best = $results | Sort-Object LastUpdated -Descending | Select-Object -First 1

                      foreach ($fileInfo in $best.Files) {
                          $newName = $fileInfo.Name
                          $newUrl  = $fileInfo.HttpDownloadUrl
                          $newHash = $fileInfo.SHA1Hash

                          Write-Host "KB$kbId -> Name: $newName | Hash: $newHash | URL: $newUrl"

                          # 如果和现有不一样则替换
                          if ($fileNode.name -ne $newName -or $fileNode.url -ne $newUrl -or $fileNode.hash.'#text' -ne $newHash) {
                              Write-Host "Updating KB$kbId: $($fileNode.name) -> $newName"
                              $releaseNote += "[$($meta4.Name)] KB$kbId: $($fileNode.name) -> $newName`n"

                              $fileNode.name = $newName
                              $fileNode.url  = $newUrl
                              $fileNode.hash.'#text' = $newHash

                              $updated = $true
                          }
                      }
                  }
              }

              if ($updated) {
                  $xmlDoc.Save($meta4.FullName)
                  Write-Host "Saved updated meta4: $($meta4.Name)"
              } else {
                  Write-Host "No updates for $($meta4.Name)"
              }
          }

          if ($releaseNote -ne "") {
              $releaseNote | Out-File "$env:GITHUB_WORKSPACE/RELEASE_NOTE.txt"
              Write-Host "`nRelease Note:`n$releaseNote"
          } else {
              Write-Host "No KB updates detected."
          }

      - name: Commit & Push changes
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Scripts RELEASE_NOTE.txt
          if (-not (git diff --cached --quiet)) {
              git commit -m "Update meta4 KBs via MSCatalogLTS"
              git push origin HEAD:2025.12b-test
          } else {
              Write-Host "Nothing to commit."
          }
